<article class="blog-post-section">
  <div class="blog-post-inner">
    <a href="/blog/" class="blog-back">← All articles</a>
    <header class="blog-post-header">
      <time class="blog-date" datetime="{{page.post.date}}">{{page.post.date_display}}</time>
      <h1 class="blog-post-title">{{page.post.title}}</h1>
    </header>
    <div class="blog-post-body">
      {{{page.post.body}}}
    </div>
    <div class="blog-post-cta">
      <h3>Ready to protect your land?</h3>
      <p>Book a free 30-minute assessment and we'll design a surveillance system for your property.</p>
      <a href="/#assessment" class="btn-primary">Book your free assessment →</a>
    </div>
  </div>
</article>
