name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build all sites
        run: node build.js --all

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          for site_dir in dist/*/; do
            site_name=$(basename "$site_dir")

            if [[ "$site_name" == _* ]] || [[ "$site_name" == *-master ]]; then
              echo "Skipping template: $site_name"
              continue
            fi

            echo "Deploying $site_name..."
            npx wrangler pages deploy "$site_dir" \
              --project-name="$site_name" \
              --commit-dirty=true
          done
